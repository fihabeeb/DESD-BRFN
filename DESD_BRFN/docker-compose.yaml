services:

  webapp:
    build: .
    container_name: brfn-app
    command: >
      sh -c "
            echo 'Waiting for DB...' &&
            sleep 5 &&
            python manage.py makemigrations &&
            python manage.py migrate &&
            python manage.py seed_producers &&
            python manage.py seed_customers &&
            python manage.py seed_allergens &&
            python manage.py seed_products2 &&
            python manage.py seed_admins &&

            python manage.py runserver 0.0.0.0:8000
      "
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - DB_NAME=brfn_db
      - DB_USER=demo_user
      - DB_PASSWORD=demo_password
      - DB_HOST=db
      - DB_PORT=5432
      - DJANGO_SUPERUSER_USERNAME=admin
      - DJANGO_SUPERUSER_EMAIL=admin@example.com
      - DJANGO_SUPERUSER_PASSWORD=secret
      - ML_SERVICE_URL=http://ml-service:8001
    depends_on:
      - db
      - redis
      - ml-service

  ml-service:
    build: ./ml-service
    container_name: brfn-ml-service
    volumes:
      - ./ml:/app/ml
    ports:
      - "8001:8001"
    environment:
      - ML_MODEL_PATH=/app/ml/best_model.keras
      - ML_ENCODER_PATH=/app/ml/encoders.pkl
      - RECOMMENDATION_MODEL_PATH=/app/ml/recommendation/final/sigmoid_lstm.keras
      - RECOMMENDATION_MAPPINGS_PATH=/app/ml/recommendation/final/sigmoid_mappings.pkl
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  db:
    image: postgres:15
    container_name: desd-brfn_db
    environment:
      - POSTGRES_USER=demo_user
      - POSTGRES_PASSWORD=demo_password
      - POSTGRES_DB=brfn_db
    ports:
      - "5432:5432"
    volumes:
      - db:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:8.4.1-alpine
    container_name: desd-brfn_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - db

  celery:
    build: .
    command: >
      sh -c "
            echo 'Waiting for migrations...' &&
            sleep 10 &&
            celery -A BRFN worker -l info
      "
    environment:
      - ML_SERVICE_URL=http://ml-service:8001
    depends_on:
      - webapp
      - redis
      - db

  celery-beat:
    build: .
    command: >
      sh -c "
            echo 'Waiting for migrations...' &&
            sleep 12 &&
            celery -A BRFN beat -l info
      "
    depends_on:
      - webapp
      - redis
      - db

volumes:
  db:
    external: false
    name: desd-brfn_db
