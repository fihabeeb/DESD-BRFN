<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My Site{% endblock %}</title>

    <style>
        body {
            background-color: #f4f4f4;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        nav {
            background-color: #333;
            padding: 10px;
        }

        nav a {
            color: white;
            margin-right: 15px;
            text-decoration: none;
            font-weight: 500;
        }

        nav a:hover {
            text-decoration: underline;
        }

        nav p {
            display: inline;
            color: #ddd;
            margin-right: 15px;
        }

        nav form {
            display: inline;
        }

        nav button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: 500;
            margin-right: 15px;
        }

        nav button:hover {
            text-decoration: underline;
        }

        main {
            padding: 20px;
        }

        footer {
            background-color: #333;
            color: white;
            padding: 10px;
            text-align: center;
            margin-top: 40px;
        }
    </style>
</head>

<body>
    <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'product_list' %}">Product List</a>

        {% if user.is_authenticated %}
            <p>Welcome, {{ user.username }} ({{ user.role }})</p>

            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit">Logout</button>
            </form>

        {% else %}
            <!-- Admin -->
            <a href="{% url 'admin:index' %}">Admin Login</a>

            <!-- Producer -->
            <a href="{% url 'producer_login' %}">Producer Login</a>
            <a href="{% url 'producer_register' %}">Producer Register</a>

            <!-- Customer -->
            <a href="{% url 'login' %}">Customer Login</a>
            <a href="{% url 'register_customer' %}">Customer Register</a>
        {% endif %}
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>My Footer</p>
    </footer>
</body>
</html>
